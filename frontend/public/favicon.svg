<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#2563EB" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background Shield Rounded Square -->
  <rect x="32" y="32" width="448" height="448" rx="120" fill="url(#bgGrad)" filter="url(#glow)" />

  <!-- Medical Cross Accent -->
  <path d="M 256 120 L 256 392 M 120 256 L 392 256" stroke="#FFFFFF" stroke-width="52" stroke-linecap="round"/>

  <!-- Pulse Dot -->
  <circle cx="392" cy="120" r="28" fill="#10B981" stroke="#FFFFFF" stroke-width="8"/>
</svg>
